sentence=The first and only Arduino library where MQ Sensors combine with Data Science
paragraph=This library supports a wide range of MQ gas sensors (MQ-2, MQ-3, MQ-4, MQ-5, MQ-6, MQ-7, MQ-8, MQ-9, MQ131, MQ-131_LOW, MQ-135, MQ-136, MQ-137, MQ-138, MQ-214, MQ-216, MQ303A, MQ303B, MQ306A, MQ307A, MQ309A). Instead of sensor-specific calibration, it uses gas-specific reference calibrations, enabling more accurate ppm calculations. Key features include temperature and humidity compensation using a correction coefficient model; calibration and analysis support for unsupported MQ models; enhanced JavaScript-based tools for hardware-free testing and computation; 3D ppm concentration graph simulation; and a Python-based 4D ppm curve estimation platform with 9 different prediction models for advanced data analysis.
category=Sensors
